version: "3.9"

services:
  db:
    image: postgres:16
    container_name: myfirstblog-postgres
    environment:
      POSTGRES_DB: myfirstblog
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5438:5432"   # внешний порт:внутренний
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: